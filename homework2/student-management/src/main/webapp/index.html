<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>学生管理系统</title>
</head>
<body>
    <h1>学生管理系统 API</h1>
    <h2>接口列表</h2>
    <ul>
        <li>GET /student/{id} - 查询学生信息</li>
        <li>PUT /student/{id}?name=xxx&age=xxx - 更新学生信息</li>
        <li>GET /classInfo/{id} - 查询班级信息</li>
    </ul>
    <h2>认证方式</h2>
    <p>请求头中携带：Authorization: valid-token-123456</p>
</body>
</html>
